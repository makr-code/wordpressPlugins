name: Release WordPress Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_slug:
        description: "Plugin directory name (e.g. themisdb-downloads)"
        required: true
        type: string
      version:
        description: "Plugin version (e.g. 1.2.0)"
        required: true
        type: string
      target_ref:
        description: "Branch or tag to release from"
        required: false
        default: "main"
        type: string
      dry_run:
        description: "If true, build and validate only (no tag push, no GitHub release)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_ref }}

      - name: Validate plugin inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_SLUG="${{ github.event.inputs.plugin_slug }}"
          VERSION="${{ github.event.inputs.version }}"
          if [[ -d "${PLUGIN_SLUG}" ]]; then
            PLUGIN_DIR="${PLUGIN_SLUG}"
            REPO_LAYOUT="flat"
          elif [[ -d "wordpress-plugins/${PLUGIN_SLUG}" ]]; then
            PLUGIN_DIR="wordpress-plugins/${PLUGIN_SLUG}"
            REPO_LAYOUT="nested"
          else
            echo "Plugin directory does not exist in flat or nested layout: ${PLUGIN_SLUG}" >&2
            exit 1
          fi

          METADATA_FILE="${PLUGIN_DIR}/update-info.json"
          MAIN_FILE="${PLUGIN_DIR}/${PLUGIN_SLUG}.php"

          if [[ ! -f "${METADATA_FILE}" ]]; then
            echo "Missing metadata file: ${METADATA_FILE}" >&2
            exit 1
          fi

          if [[ ! -f "${MAIN_FILE}" ]]; then
            if [[ "${PLUGIN_SLUG}" == "persistent-podcast-player" && -f "${PLUGIN_DIR}/persistent-podcast-player.php" ]]; then
              MAIN_FILE="${PLUGIN_DIR}/persistent-podcast-player.php"
            else
              echo "Missing main plugin file: ${MAIN_FILE}" >&2
              exit 1
            fi
          fi

          METADATA_VERSION=$(jq -r '.version' "${METADATA_FILE}")
          if [[ "${METADATA_VERSION}" != "${VERSION}" ]]; then
            echo "update-info.json version (${METADATA_VERSION}) does not match workflow input (${VERSION})." >&2
            exit 1
          fi

          echo "plugin_slug=${PLUGIN_SLUG}" >> "$GITHUB_OUTPUT"
          echo "plugin_dir=${PLUGIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "repo_layout=${REPO_LAYOUT}" >> "$GITHUB_OUTPUT"
          echo "main_file=${MAIN_FILE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${PLUGIN_SLUG}/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure local updater copy exists
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ steps.validate.outputs.plugin_dir }}"
          LOCAL_UPDATER="${PLUGIN_DIR}/includes/class-themisdb-plugin-updater.php"

          if [[ -f "includes/class-themisdb-plugin-updater.php" ]]; then
            SHARED_UPDATER="includes/class-themisdb-plugin-updater.php"
          elif [[ -f "wordpress-plugins/includes/class-themisdb-plugin-updater.php" ]]; then
            SHARED_UPDATER="wordpress-plugins/includes/class-themisdb-plugin-updater.php"
          else
            echo "Shared updater file missing in flat or nested layout." >&2
            exit 1
          fi

          mkdir -p "$(dirname "${LOCAL_UPDATER}")"
          cp "${SHARED_UPDATER}" "${LOCAL_UPDATER}"

      - name: Build plugin zip
        id: package
        shell: bash
        run: |
          set -euo pipefail

          PLUGIN_SLUG="${{ steps.validate.outputs.plugin_slug }}"
          PLUGIN_DIR="${{ steps.validate.outputs.plugin_dir }}"
          REPO_LAYOUT="${{ steps.validate.outputs.repo_layout }}"

          mkdir -p dist
          ZIP_FILE="dist/${PLUGIN_SLUG}.zip"
          rm -f "${ZIP_FILE}"

          if [[ "${REPO_LAYOUT}" == "nested" ]]; then
            (cd wordpress-plugins && zip -r "../${ZIP_FILE}" "${PLUGIN_SLUG}" \
              -x "${PLUGIN_SLUG}/.git/*" \
              -x "${PLUGIN_SLUG}/.DS_Store" \
              -x "${PLUGIN_SLUG}/node_modules/*" \
              -x "${PLUGIN_SLUG}/dist/*")
          else
            zip -r "${ZIP_FILE}" "${PLUGIN_SLUG}" \
              -x "${PLUGIN_SLUG}/.git/*" \
              -x "${PLUGIN_SLUG}/.DS_Store" \
              -x "${PLUGIN_SLUG}/node_modules/*" \
              -x "${PLUGIN_SLUG}/dist/*"
          fi

          if [[ ! -f "${ZIP_FILE}" ]]; then
            echo "ZIP package was not created." >&2
            exit 1
          fi

          echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.validate.outputs.tag_name }}"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG_NAME}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG_NAME}" -m "Release ${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.validate.outputs.tag_name }}
          name: ${{ steps.validate.outputs.plugin_slug }} v${{ steps.validate.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_file }}

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          echo "Dry-run completed for plugin '${{ steps.validate.outputs.plugin_slug }}' version '${{ steps.validate.outputs.version }}'."
          echo "Built artifact: ${{ steps.package.outputs.zip_file }}"
          echo "Would create tag: ${{ steps.validate.outputs.tag_name }}"
