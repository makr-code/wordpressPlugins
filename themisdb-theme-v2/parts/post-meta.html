	<!-- Reading time (calculated via HTML block) -->
	<!-- wp:html -->
	<?php
	global $post;
	if ( $post ) {
		$content    = get_post_field( 'post_content', $post );
		$word_count = str_word_count( strip_tags( $content ) );
		$minutes    = max( 1, (int) ceil( $word_count / 200 ) );
		echo '<span class="themis-reading-time" style="color:#7f8c8d;font-size:0.875rem;">'
			. esc_html( $minutes ) . ' min read</span>';
	}
	?>
